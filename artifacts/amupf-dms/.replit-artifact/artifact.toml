kind = "web"
previewPath = "/"
title = "AMUPF Digital Management System"
version = "1.0.0"
id = "artifacts/amupf-dms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21599

[services.development]
run = "pnpm --filter @workspace/amupf-dms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/amupf-dms", "run", "build" ]
publicDir = "artifacts/amupf-dms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21599"
BASE_PATH = "/"
