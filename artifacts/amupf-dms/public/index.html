<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMUPF Digital Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- PUBLIC PAGES (no sidebar) -->
<div id="public-shell" class="hidden">
  <div id="public-content"></div>
</div>

<!-- APP SHELL (with sidebar) -->
<div id="app-shell" class="hidden app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>AMUPF</span>
      </div>
      <div class="sidebar-subtitle">Digital Management System</div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Rendered by JS based on role -->
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <!-- Rendered by JS -->
      </div>
      <button class="btn-logout" id="btn-logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main area -->
  <div class="main-area">
    <!-- Topbar -->
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <button class="notif-btn" id="notif-btn" onclick="navigate('/notifications')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge hidden" id="notif-badge">0</span>
        </button>
        <div class="topbar-user" id="topbar-user">
          <div class="avatar" id="topbar-avatar">U</div>
          <span id="topbar-name">User</span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content" id="app-content"></main>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal container -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Confirm</h3>
      <button onclick="closeModal()" class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm-btn">Confirm</button>
    </div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
